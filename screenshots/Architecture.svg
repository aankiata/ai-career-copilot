<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Application architecture diagram with themed shapes</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A person icon representing the user connects to a rounded rectangle for the React and Tailwind CSS frontend on Vercel, which connects via Axios REST API to a rounded rectangle for the FastAPI backend on Render. The backend fans out to a cloud icon for the Gemini AI API, a database cylinder for PostgreSQL on Neon, and a document icon for the PDF generator using ReportLab.</desc>
